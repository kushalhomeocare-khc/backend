<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connecting to WhatsApp | Kushal Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#f5f5f5;font-family:Roboto,sans-serif;text-align:center;color:#222}
.header{display:block;width:100vw;max-width:none;margin:0 calc(50% - 50vw)}
.wrap{max-width:700px;margin:40px auto;padding:20px}
h1{font-family:Oswald,sans-serif;color:#12CFFF;font-size:clamp(28px,6vw,42px);margin:12px 0}
.desc{font-size:18px;line-height:1.7;color:#555}
.spinner{width:78px;height:78px;border:8px solid #d9f7ff;border-top:8px solid #12CFFF;border-radius:50%;margin:35px auto;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading,#tap{font-size:16px;color:#666;margin-top:18px}
#tap,.btn{display:none}
.btn{display:none;background:#12CFFF;color:#000;text-decoration:none;font-weight:700;text-transform:uppercase;padding:14px 29px;border-radius:60px;font-size:16px;box-shadow:0 6px 18px rgba(0,0,0,.12)}
</style>
</head>
<body>
<img src="/ko_header.png" class="header" alt="Kushal Online">
<div class="wrap">
<div id="spinner" class="spinner"></div>
<h1>Connecting to WhatsApp...</h1>
<p id="desc" class="desc">Please wait while we connect you with our International Patient Support Team.</p>
<p id="loading">Preparing secure connection...</p>
<p id="tap">Tap to open WhatsApp and connect with our team.</p>
<a id="btn" class="btn" href="https://api.whatsapp.com/send/?phone=918429290777&text=Hello%20Kushal%20Online%2C%0A%0AI%20am%20interested%20in%20your%20Online%20Homeopathy%20Treatment.%0A%0AI%20would%20like%20to%20enquire%20about%20any%20special%20offers%20available%20for%20NRI%20patients.%0A%0AI%20look%20forward%20to%20your%20response.%0A%0AThank%20you.&type=phone_number&app_absent=0&wame_ctl=1" target="_self">CONNECT ON WHATSAPP</a>
</div>
<script>
setTimeout(function(){
document.getElementById('spinner').style.display='none';
document.querySelector('h1').style.display='none';
document.getElementById('desc').style.display='none';
document.getElementById('loading').style.display='none';
document.getElementById('tap').style.display='block';
document.getElementById('btn').style.display='inline-block';
},3500);
</script>
</body>
</html>
