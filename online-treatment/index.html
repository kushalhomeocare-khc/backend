<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treatment Plans | Kushal Online</title>

<!-- All styling lives in style.css — no embedded CSS, no inline styles. -->
<link rel="stylesheet" href="style.css">
</head>
<body style="margin:0;">

<!--
  This markup is intentionally minimal: header, region toggle, and an
  empty plans container. Every plan card, note list, and payment block
  is generated at runtime by plans.js from plans.json — there is no
  plan content hardcoded here.
-->

<div class="plans-section" id="top">
  <div class="wrap">

    <!-- Top bar: region toggle only -->
    <div class="topbar">
      <div class="toggle-wrap">
        <p class="toggle-caption">Select your Region</p>
        <div class="toggle glass-block" id="regionToggle">
          <input type="radio" name="region" id="region-india" value="india">
          <input type="radio" name="region" id="region-global" value="global">
          <svg class="chev chev-left" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M12 5L7 10L12 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <label for="region-india">India</label>
          <label for="region-global">Global</label>
          <svg class="chev chev-right" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M8 5L13 10L8 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="thumb"></span>
        </div>
      </div>
    </div>

    <!-- Region header (flag/globe icon + title) generated here, region-specific -->
    <div id="regionHeader"></div>

    <!-- Plan cards generated here by plans.js -->
    <div id="plansStage" class="plans-stage"></div>

    <!-- "Please Note" block generated here (region-specific) -->
    <div id="noteBlock"></div>

    <!-- NRI pricing callout — only rendered when the region's JSON includes it -->
    <div id="nriBlock"></div>

  </div>
</div>

<!-- Vanilla JS only. No frameworks, no build step. -->
<script src="plans.js"></script>
</body>
</html>
