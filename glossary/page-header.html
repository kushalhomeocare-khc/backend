<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete the Form Below</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
  }

  .form-header {
    background-color: #161616;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px 24px;
    margin: 0;
    width: 100%;
    max-width: 100%;
    border-bottom: 4px solid #12cfff;
  }

  .form-header__inner {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .form-header__text {
    font-family: "Fjalla One", sans-serif;
    font-weight: 400;
    color: #12cfff;
    text-transform: uppercase;
    text-align: center;
    font-size: 32px;
    line-height: 1.3;
    letter-spacing: 0.5px;
    margin: 0;
  }

  @media (min-width: 768px) {
    .form-header__text {
      font-size: 32px;
    }
  }
</style>
</head>
<body>

<section class="form-header">
  <div class="form-header__inner">
    <h1 class="form-header__text">Homeopathy Treatment for Chronic Kidney Diseases</h1>
  </div>
</section>

</body>
</html>
